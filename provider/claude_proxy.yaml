provider: claude-proxy
label:
  en_US: Claude Proxy
  zh_Hans: Claude 代理
description:
  en_US: Anthropic Claude models via custom proxy URL (native Anthropic Messages API)
  zh_Hans: 通过自定义代理 URL 使用 Claude 模型（原生 Anthropic Messages API）
icon_small:
  en_US: icon.svg
supported_model_types:
  - llm
configurate_methods:
  - customizable-model
model_credential_schema:
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
    placeholder:
      en_US: "e.g. anthropic/claude-sonnet-4-6"
      zh_Hans: "例如 anthropic/claude-sonnet-4-6"
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
        zh_Hans: API 密钥
      type: secret-input
      required: true
      placeholder:
        en_US: Enter your API key
        zh_Hans: 输入您的 API 密钥
    - variable: endpoint_url
      label:
        en_US: API Base URL
        zh_Hans: API 基础 URL
      type: text-input
      required: true
      placeholder:
        en_US: "https://your-proxy.example.com/v1"
        zh_Hans: "https://your-proxy.example.com/v1"
    - variable: max_tokens_to_sample
      label:
        en_US: Max Tokens
        zh_Hans: 最大 Token 数
      type: text-input
      required: false
      default: "8192"
extra:
  python:
    provider_source: provider/claude_proxy.py
    model_sources:
      - "models/llm/llm.py"
